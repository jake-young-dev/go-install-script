name: "go-install-script"
description: "quick and dirty install for golang on linux workflows"
inputs:
  architecture:
    description: "linux architecture to use for Go files (e.g. amd64)"
    required: true
    default: "."
  purge:
    description: "delete any previously installed go versions"
    required: false
    default: "no"
  versions:
    description: "used to pull extra go versions besides just that listed in the go.mod file"
    required: false
    default: "."
runs:
  using: composite
  steps:
    - name: "run script"
      run: ${{ github.action_path }}/go.sh ${{ inputs.architecture }} ${{ inputs.purge }} ${{ inputs.versions }}
      shell: bash
      env:
        INPUT_VERSIONS: ${{ inputs.versions }}