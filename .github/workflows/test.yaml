name: "go-install-test"

on:
  push:
    branches:
      - "**"

jobs:
  install-test:
    runs-on: [ubuntu-latest]
    steps:
      - name: "checkout repo"
        uses: actions/checkout@v4
        sparse_checkout: |
          go.sh
      
      - name: "run script"
        run: |
          chmod +x ./go.sh
          echo -e "module git.jakeyoungdev.com/jake.young.dev/go-install-script\n\ngo 1.23.5" > go.mod
          ./go.sh ${{ vars.GO_TEST_ARCH }}
